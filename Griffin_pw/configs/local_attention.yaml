# Local Attention model configuration (matching RecurrentGemma paper)
vocab_size: 1000  # Smaller vocab for synthetic tasks
d_model: 144
num_layers: 6
num_heads: 4
max_seq_len: 2048
local_window: 64  # Smaller window for efficiency
dropout: 0.1
layer_norm: true
tie_embeddings: true

# Training hyperparameters
batch_size: 32
learning_rate: 0.001
weight_decay: 0.01
num_epochs: 20
optimizer: "adamw"
scheduler: "cosine"

# Dataset options
dataset: "MQAR"  # or "Chomsky" or "Copy"
sequence_length: 512
dataset_difficulty: "medium"  # e.g., easy, medium, hard

# Logging and evaluation
logging:
  tensorboard: true
  log_interval: 50
  save_checkpoints: true
  checkpoint_interval: 5
